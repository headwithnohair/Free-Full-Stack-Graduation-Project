server:
  port: 1234

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/miniprogram
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mapper:
  mappers:
   - com.baomidou.mybatisplus.core.mapper.BaseMapper;
  not-empty: true
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
  mapper-locations: classpath*:com/example/demospringboot/mapper/xml/*

logging:
  level:
    com.example.demospringboot.mapper: debug
    com.example.demospringboot.service: debug
    com.example.demospringboot.controller: debug

